<form method="POST">
    <select name="flavor">
        {% for f in flavors %}
            <option value="{{ f }}">{{ f }}</option>
        {% endfor %}
    </select>

    <select name="topping">
        {% for t in toppings %}
            <option value="{{ t }}">{{ t }}</option>
        {% endfor %}
    </select>

    <button type="submit">Create Slushie</button>
</form>

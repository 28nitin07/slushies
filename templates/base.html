<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slushie Time Capsule</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ url_for('index') }}">Slushie Time Capsule</a>
      <nav class="site-nav">
        <a href="{{ url_for('create') }}">Create Capsule</a>
        <a href="{{ url_for('visualizer') }}">Visualizer</a>
        <a href="{{ url_for('explore') }}">Timeline</a>
        <a href="{{ url_for('on_this_day') }}">On This Day</a>
        <a href="{{ url_for('roulette') }}">Roulette</a>
        <a href="{{ url_for('today') }}">Daily Mix</a>
      </nav>
    </header>

    <main class="page-shell">
      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      <div class="flash-wrap">
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>
  </body>
</html>
